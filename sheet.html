<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>콘티 시트 보기</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="sheet-page">
  <div class="page-shell">
    <main>
      <section class="panel">
        <div class="section-heading">
          <p class="section-kicker">Sheet View</p>
          <h2>콘티 시트</h2>
        </div>
        <div class="top-actions print-actions">
          <button class="button primary" type="button" onclick="window.print()">PDF로 출력하기</button>
          <a class="button ghost" href="overview.html">전체 씬 흐름 보기</a>
          <a class="button ghost" href="index.html">편집 페이지로 돌아가기</a>
        </div>
        <p class="overview-summary" id="sheet-summary">저장된 장면을 불러오는 중입니다.</p>
        <div class="sheet-pages" id="sheet-pages"></div>
        <p class="empty-state" id="sheet-empty" hidden>저장된 컷이 없습니다. 먼저 스토리보드 페이지에서 장면을 추가해주세요.</p>
      </section>
    </main>
  </div>

  <script type="module" src="sheet.js"></script>
</body>
</html>
